baseURL = "https://deviq.com/"
languageCode = "en-us"
title = "DevIQ"

enableRobotsTXT = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  description = "Software development reference and learning"

  [params.navbar]
    displayTitle = true
    displayLogo = true
    [params.navbar.logo]
      path = "images/logo.svg"
      dark = "images/logo-dark.svg"
      width = "32"
      height = "32"
      link = "/"

  [params.theme]
    default = "system"
    displayToggle = true

  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = false

  [params.search]
    enable = true
    type = "flexsearch"

  [params.mermaid]
    base = "https://cdn.jsdelivr.net/npm/mermaid"

[menu]
  [[menu.main]]
    identifier = "NimblePros"
    name = "NimblePros"
    url = "https://nimblepros.com"
    weight = 1
  [[menu.main]]
    identifier = "theme-toggle"
    weight = 100
    [menu.main.params]
      type = "theme-toggle"
